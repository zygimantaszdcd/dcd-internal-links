name: Update Internal Links JSON

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-links:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Test API connection
        env:
          DECODO_API_TOKEN: ${{ secrets.DECODO_API_TOKEN }}
        run: |
          python scripts/test_api.py
      
      - name: Run link generator
        env:
          DECODO_API_TOKEN: ${{ secrets.DECODO_API_TOKEN }}
        run: |
          python scripts/generate_links.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/internal-links.json
          git diff --staged --quiet || git commit -m "Update internal links JSON - $(date -u +%Y-%m-%d)"
          git push
